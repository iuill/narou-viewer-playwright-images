name: Build Playwright Image

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      playwright_version:
        description: "Playwright version to install"
        required: true
        default: "1.58.2"
      node_version:
        description: "Node major version for node:<version>-bookworm-slim"
        required: true
        default: "20"
      bun_version:
        description: "Bun version to install"
        required: true
        default: "1.3.11"

permissions:
  contents: read
  packages: write

env:
  DEFAULT_PLAYWRIGHT_VERSION: "1.58.2"
  DEFAULT_NODE_VERSION: "20"
  DEFAULT_BUN_VERSION: "1.3.11"
  IMAGE_NAME: ghcr.io/iuill/narou-viewer-playwright
  PACKAGE_NAME: narou-viewer-playwright
  DATE_TAGS_TO_KEEP: "14"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve build settings
        run: |
          set -euo pipefail

          playwright_version="${{ github.event.inputs.playwright_version || env.DEFAULT_PLAYWRIGHT_VERSION }}"
          node_version="${{ github.event.inputs.node_version || env.DEFAULT_NODE_VERSION }}"
          bun_version="${{ github.event.inputs.bun_version || env.DEFAULT_BUN_VERSION }}"
          date_tag="$(date -u +%Y%m%d)"
          tag_base="${playwright_version}-node${node_version}-bookworm-slim-chromium-headless-shell-webkit-amd64"

          {
            echo "PLAYWRIGHT_VERSION=${playwright_version}"
            echo "NODE_VERSION=${node_version}"
            echo "BUN_VERSION=${bun_version}"
            echo "TAG_BASE=${tag_base}"
            echo "DATE_TAG=${date_tag}"
          } >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for smoke test
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64 \
            --load \
            --build-arg NODE_VERSION="${NODE_VERSION}" \
            --build-arg PLAYWRIGHT_VERSION="${PLAYWRIGHT_VERSION}" \
            --build-arg BUN_VERSION="${BUN_VERSION}" \
            --tag "${IMAGE_NAME}:${TAG_BASE}" \
            --tag "${IMAGE_NAME}:${TAG_BASE}-${DATE_TAG}" \
            .

      - name: Smoke test image
        run: scripts/smoke.sh "${IMAGE_NAME}:${TAG_BASE}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          set -euo pipefail

          docker image push "${IMAGE_NAME}:${TAG_BASE}"
          docker image push "${IMAGE_NAME}:${TAG_BASE}-${DATE_TAG}"

      - name: Prune old date-tagged image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mapfile -t delete_ids < <(
            gh api --paginate "/user/packages/container/${PACKAGE_NAME}/versions?per_page=100" \
              --jq '
                [ .[]
                  | select(
                      (.metadata.container.tags // [])
                      | any(test("-[0-9]{8}$"))
                    )
                  | {
                      id,
                      created_at,
                      keep:
                        (
                          (.metadata.container.tags // [])
                          | any(. == env.TAG_BASE or . == (env.TAG_BASE + "-" + env.DATE_TAG))
                        )
                    }
                ]
                | sort_by(.created_at)
                | reverse
                | map(select(.keep | not))
                | .['"${DATE_TAGS_TO_KEEP}"':]
                | .[].id
              '
          )

          if [ "${#delete_ids[@]}" -eq 0 ]; then
            echo "No old date-tagged image versions to prune."
            exit 0
          fi

          for version_id in "${delete_ids[@]}"; do
            echo "Deleting package version ${version_id}"
            gh api \
              --method DELETE \
              "/user/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done

      - name: Summarize image
        run: |
          {
            echo "## Published image"
            echo ""
            echo "- ${IMAGE_NAME}:${TAG_BASE}"
            echo "- ${IMAGE_NAME}:${TAG_BASE}-${DATE_TAG}"
            echo ""
            echo "Playwright: ${PLAYWRIGHT_VERSION}"
            echo "Node: ${NODE_VERSION}"
            echo "Bun: ${BUN_VERSION}"
            echo "Browsers: chromium-headless-shell, webkit"
            echo "Platform: linux/amd64"
            echo "Date-tagged versions kept: ${DATE_TAGS_TO_KEEP}"
          } >> "${GITHUB_STEP_SUMMARY}"
